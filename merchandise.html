<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自制周边 - MilkyWay</title>
    <style>
        /* 全局样式 */
        :root {
            /* 现实世界：棕色、黄色温暖色调 */
            --reality-color: #fff3e8;
            --reality-accent: #c9a66b;
            --reality-light: #fbeed9;
            --reality-dark: #8b7355;

            --text-color: #333;
            --light-text: #333;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--reality-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 头部 */
        header {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--reality-accent);
            text-decoration: none;
        }

        /* 导航 */
        nav ul {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--reality-accent);
        }

        nav a.active {
            color: var(--reality-accent);
            font-weight: bold;
        }

        /* 内容 */
        .content {
            margin-top: 40px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-header h1 {
            font-size: 36px;
            color: var(--reality-dark);
            margin-bottom: 20px;
        }

        .page-header p {
            font-size: 18px;
            color: var(--reality-accent);
        }

        /* 周边产品网格 */
        .merchandise-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .merchandise-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .merchandise-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .merchandise-item img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .merchandise-info {
            padding: 20px;
        }

        .merchandise-info h3 {
            font-size: 18px;
            color: var(--reality-dark);
            margin-bottom: 10px;
        }

        .merchandise-info p {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .merchandise-price {
            font-weight: bold;
            color: var(--reality-accent);
            font-size: 16px;
        }

        /* 制作过程 */
        .process-section {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            margin-bottom: 60px;
        }

        .process-section h2 {
            color: var(--reality-dark);
            margin-bottom: 30px;
            text-align: center;
        }

        .process-steps {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .process-step {
            flex: 1;
            min-width: 200px;
            text-align: center;
        }

        .step-number {
            width: 50px;
            height: 50px;
            background-color: var(--reality-accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
            margin: 0 auto 20px;
        }

        .process-step h3 {
            color: var(--reality-dark);
            margin-bottom: 10px;
        }

        .process-step p {
            color: #666;
            font-size: 14px;
        }

        /* 返回按钮 */
        .back-button {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 24px;
            background-color: var(--reality-accent);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: var(--transition);
        }

        .back-button:hover {
            background-color: var(--reality-dark);
            transform: translateY(-2px);
        }

        /* 页脚 */
        footer {
            margin-top: 80px;
            padding: 40px 0;
            background-color: rgba(255, 255, 255, 0.9);
            text-align: center;
            border-top: 1px solid rgba(139, 115, 85, 0.2);
        }

        footer p {
            color: var(--reality-dark);
            margin-bottom: 10px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 20px;
            }

            nav ul {
                flex-wrap: wrap;
                justify-content: center;
            }

            .merchandise-grid {
                grid-template-columns: 1fr;
            }

            .process-steps {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>

            <nav>
